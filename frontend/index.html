<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社群签到数据统计</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 32px 0;
            text-align: center;
        }
        .header h1 { font-size: 28px; font-weight: 600; }
        .header p { margin-top: 8px; font-size: 14px; opacity: 0.85; }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 16px;
        }
        .chart-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            padding: 24px;
            margin-bottom: 24px;
        }
        .chart-card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 12px;
            border-left: 4px solid #667eea;
        }
        .chart-container { width: 100%; height: 420px; }
        .loading {
            text-align: center;
            padding: 60px 0;
            color: #999;
            font-size: 14px;
        }
        .error {
            text-align: center;
            padding: 60px 0;
            color: #e74c3c;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>社群活动签到统计</h1>
        <p>本地社群活动签到数据的可视化分析面板</p>
    </div>

    <div class="container">
        <div class="chart-card">
            <h2>每月签到人数趋势</h2>
            <div id="monthlyChart" class="chart-container">
                <div class="loading">数据加载中...</div>
            </div>
        </div>

        <div class="chart-card">
            <h2>周一至周日签到分布</h2>
            <div id="weekdayChart" class="chart-container">
                <div class="loading">数据加载中...</div>
            </div>
        </div>
    </div>

    <script>
        var API_BASE = "http://localhost:8000";

        function renderMonthlyChart(data) {
            var chartDom = document.getElementById("monthlyChart");
            chartDom.innerHTML = "";
            var chart = echarts.init(chartDom);

            var months = data.map(function (d) { return d.month; });
            var totals = data.map(function (d) { return d.total; });

            var option = {
                tooltip: {
                    trigger: "axis",
                    formatter: function (params) {
                        var p = params[0];
                        return p.name + "<br/>签到人数：<b>" + p.value + "</b>";
                    }
                },
                grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
                xAxis: {
                    type: "category",
                    boundaryGap: false,
                    data: months,
                    axisLabel: { color: "#666" },
                    axisLine: { lineStyle: { color: "#ddd" } }
                },
                yAxis: {
                    type: "value",
                    axisLabel: { color: "#666" },
                    splitLine: { lineStyle: { type: "dashed", color: "#eee" } }
                },
                series: [{
                    name: "签到人数",
                    type: "line",
                    data: totals,
                    smooth: true,
                    symbol: "circle",
                    symbolSize: 8,
                    lineStyle: { width: 3, color: "#667eea" },
                    itemStyle: { color: "#667eea" },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: "rgba(102,126,234,0.35)" },
                            { offset: 1, color: "rgba(102,126,234,0.02)" }
                        ])
                    }
                }]
            };

            chart.setOption(option);
            window.addEventListener("resize", function () { chart.resize(); });
        }

        function renderWeekdayChart(data) {
            var chartDom = document.getElementById("weekdayChart");
            chartDom.innerHTML = "";
            var chart = echarts.init(chartDom);

            var names = data.map(function (d) { return d.weekday_name; });
            var totals = data.map(function (d) { return d.total; });

            var option = {
                tooltip: {
                    trigger: "axis",
                    axisPointer: { type: "shadow" },
                    formatter: function (params) {
                        var p = params[0];
                        return p.name + "<br/>签到人数：<b>" + p.value + "</b>";
                    }
                },
                grid: { left: "3%", right: "4%", bottom: "3%", containLabel: true },
                xAxis: {
                    type: "category",
                    data: names,
                    axisLabel: { color: "#666" },
                    axisLine: { lineStyle: { color: "#ddd" } }
                },
                yAxis: {
                    type: "value",
                    axisLabel: { color: "#666" },
                    splitLine: { lineStyle: { type: "dashed", color: "#eee" } }
                },
                series: [{
                    name: "签到人数",
                    type: "bar",
                    data: totals,
                    barWidth: "45%",
                    itemStyle: {
                        borderRadius: [6, 6, 0, 0],
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: "#667eea" },
                            { offset: 1, color: "#764ba2" }
                        ])
                    },
                    emphasis: {
                        itemStyle: {
                            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                                { offset: 0, color: "#7b93ff" },
                                { offset: 1, color: "#8a5fc7" }
                            ])
                        }
                    }
                }]
            };

            chart.setOption(option);
            window.addEventListener("resize", function () { chart.resize(); });
        }

        function showError(containerId, msg) {
            var el = document.getElementById(containerId);
            el.innerHTML = '<div class="error">' + msg + '</div>';
        }

        function fetchData() {
            fetch(API_BASE + "/api/stats/monthly")
                .then(function (res) {
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    return res.json();
                })
                .then(function (json) { renderMonthlyChart(json.data); })
                .catch(function (err) {
                    showError("monthlyChart", "月度数据加载失败：" + err.message);
                });

            fetch(API_BASE + "/api/stats/weekday")
                .then(function (res) {
                    if (!res.ok) throw new Error("HTTP " + res.status);
                    return res.json();
                })
                .then(function (json) { renderWeekdayChart(json.data); })
                .catch(function (err) {
                    showError("weekdayChart", "星期数据加载失败：" + err.message);
                });
        }

        fetchData();
    </script>
</body>
</html>
